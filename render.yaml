services:
  - type: web
    name: the-domin-inn-orders
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /data
      - key: ORDER_APP_PASSWORD
        sync: false
    disk:
      name: domin-orders-data
      mountPath: /data
      sizeGB: 1
